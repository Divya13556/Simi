<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simi Chatbot</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>SkillGlider Website</h1>

<!-- AGENT POPUP -->
<div id="simi-agent">
    <div id="agent-message">
        Hi! 👋 This is Simi.<br>
        Tap to chat now
    </div>
</div>

<!-- CHAT BUTTON WITH LABEL -->
<div id="chatbot-wrapper">
    <div id="chatbot-label">Simi</div>
    <div id="chatbot-button">🤖</div>
</div>

<!-- CHATBOX -->
<div id="chatbot-container">

<div id="chatbot-header">
<span>Simi - SkillGlider Assistant</span>
<button id="close-chat">X</button>
</div>

<div id="chatbot-messages">

<div class="bot-message">
Hello 👋 I'm Simi.  
How can I help you today?
</div>

<div id="quick-options">
<button class="quick-btn">career</button>
<button class="quick-btn">resources</button>
<button class="quick-btn">support</button>

<button class="quick-btn">internships</button>
<button class="quick-btn">free courses</button>
<button class="quick-btn">paid courses</button>
<button class="quick-btn">certifications</button>
<button class="quick-btn">hackathons</button>
</div>

</div>

<div id="chatbot-input-area">
<input type="text" id="user-input" placeholder="Type your message...">
<button id="send-btn">Send</button>
</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
